<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPO</title>
  <style>
    * {
        box-sizing: border-box;
    }

    #gradient{ 
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: fit-content;
        background-image: linear-gradient(to bottom,
        

           rgb(5, 255, 255,1) 0%,
          rgba(5, 255, 255, 0.85) 25%,
        rgba(5, 255, 255, 0.5) 50%,
        rgba(5, 255, 255, 0.15) 75%,
        rgba(5, 255, 255, 0) 100%
          
        );
        
        padding-bottom: 2vh;
        min-height: 10%;
    }
    body{ 
        background-image: url(brickwall.gif);
        background-blend-mode: darken;

        background-color: rgba(0,0,0,0.9);
        
    }
    
    @keyframes shake {
         0%   { transform: scale(1.15) rotate(0deg); }
        25%  { transform: scale(1.15) rotate(-10deg); }
        50%  { transform: scale(1.15) rotate(10deg); }
        75%  { transform: scale(1.15) rotate(-10deg); }
        100% { transform: scale(1.15) rotate(0deg); }
    }
    #little_budy{
        position: fixed;
        bottom: 1vh;
        left: 1vh;
        width: auto;
        height: 15%;
        filter: drop-shadow(0 0 3wv rgba(0, 255, 251, 0.6));
    }
    #little_budy:hover {
  transform: scale(1.15); 
    }   
  #little_budy.shake {
    animation: shake 0.4s ease;
    }
  .center{ 
    display: flex;
    justify-content: center; 
    align-items: center;  
       
    }
    .complete_center{
        display: flex;
    justify-content: center;
    align-items: center; 
    min-height: 100vh;
    }

    #logo{ 
          width: 40vw;     
    
         height: auto;
         filter: drop-shadow(0px 0px 3em rgba(0, 0, 0, 1));
         min-width: 50%;
    }
    .baybeh{ 
       width: 5vw;      
    
         height: auto;
         animation: HeComin 300s linear forwards;
         z-index: -2;
    
    }
    div.outlined_box{
        display: flex;
        justify-content: flex-start; 
        flex-wrap: wrap;
         align-items: center; 
        border-style: solid;
        border-color: rgb(0, 255, 76);
         max-width: 70dvw;
        margin: 20rem auto 0 auto; 
        gap: 10px;
        padding: 1rem;

    }
    div.gallery-item { 
        
        border: 1px solid #ccc;
        width: calc(33.333% - 7px);
        
    }
    div.gallery-item img{
        width: 100%;
        height: auto;
        display: block; 
    }
@media only screen and (max-width: 768px) {
  div.gallery-item {
    width: 100%; 
  }
  div.outlined_box {
    margin-top: 10rem; 
  }
}



    @keyframes HeComin {
     from { transform: scale(1); }
    to   { transform: scale(20); }
}
  </style>
    
</head>

<body>

<div id="gradient">
    <div class="center">
        <img src="REPO_Logo.webp" alt="REPO Title" id="logo">
    </div>  
</div>

<div class="outlined_box">
    <div class="gallery-item">
        <img src="repo_one.jpg" alt="picture one">
    </div>
    <div class="gallery-item">
        <img src="repo_two.jpg" alt="picture one">
    </div>
    <div class="gallery-item">
        <img src="repo_three.jpg" alt="picture one">
    </div>
</div>

<div class="complete_center">
    <img src="Rugrat.webp" alt="DaBaby" class="baybeh">
</div>


<div>
    <img src="Little_Buddy.png" alt="little_GUY" id="little_budy">
</div>
    




<script>
      const character = document.getElementById('little_budy');
      
      character.addEventListener('click', () => { 
        character.classList.add('shake');
        character.addEventListener('animationend', () => {
          character.classList.remove('shake');
        }, { once: true });
        // Trigger download
        const link = document.createElement('a');
        link.href = character.src;
        link.download = 'Little_Buddy.png'; 
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    </script>
</body>
</html>
