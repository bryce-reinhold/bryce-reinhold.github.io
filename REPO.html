<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank HTML5 Template</title>
  <style>
    #gradient{ 
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 30dvh;
        background-image: linear-gradient(to bottom, rgb(5, 255, 5), black);
        z-index: -1;
    }
    body{ 
        background-color: black;
        
    }
    
    @keyframes shake {
         0%   { transform: scale(1.15) rotate(0deg); }
        25%  { transform: scale(1.15) rotate(-10deg); }
        50%  { transform: scale(1.15) rotate(10deg); }
        75%  { transform: scale(1.15) rotate(-10deg); }
        100% { transform: scale(1.15) rotate(0deg); }
    }
    #little_budy{
        position: fixed;
        bottom: 1vh;
        left: 1vh;
        width: auto;
        height: 15%;
    }
    #little_budy:hover {
  transform: scale(1.15); 
    }   
  #little_budy.shake {
    animation: shake 0.4s ease;
    }
  .header{ 
       display: flex;
        justify-content: center; 
            align-items: center;  
       
    }
    .header img{ 
        max-width: 100%;
    width: 40vw;
    height: auto;
    }
    #logo{ 
          width: 40vw;     
    
    height: auto;
    }
  </style>
    
</head>
<div id="gradient"></div>
<body>
<div class="header">
    <img src="REPO_Logo.webp" alt="REPO Title" id="logo" id="logo">
</div>

    
<div>
    <img src="Little_Buddy.png" alt="little_GUY" id="little_budy">
</div>



<script>
      const character = document.getElementById('little_budy');
      
      character.addEventListener('click', () => { 
        character.classList.add('shake');
        character.addEventListener('animationend', () => {
          character.classList.remove('shake');
        }, { once: true });
        // Trigger download
        const link = document.createElement('a');
        link.href = character.src;
        link.download = 'Little_Buddy.png'; 
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    </script>
</body>
</html>
