<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sycamore Technologies</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      background-color: #F8F0CC;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .video-wrapper {
      width: 100%;
      max-width: 960px;
    }

    video {
      display: block;
      width: 100%;
      height: auto;
      max-height: 90vh;
      object-fit: contain;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
        align-items: center;
      }

      video {
        max-height: 80vh;
      }
    }
  </style>
</head>
<body>
  <div class="video-wrapper">
    <video autoplay controls playsinline>
      <source src="sycamore_technologies.mp4" type="video/mp4">
    </video>
  </div>
</body>
</html>
