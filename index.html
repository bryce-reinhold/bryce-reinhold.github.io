<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sycamore Technologies</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      background-color: #000000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .video-wrapper {
      width: 100%;
      max-width: 960px;
    }

    video {
      display: block;
      width: 100%;
      height: auto;
      max-height: 90vh;
      object-fit: contain;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
        align-items: center;
      }

      video {
        max-height: 80vh;
      }
    }
  </style>
</head>
<body>
  <div class="video-wrapper">
    <div id="play-screen" style="display:flex; align-items:center; justify-content:center;">
      <button id="play-btn" onclick="document.getElementById('play-screen').style.display='none'; var v=document.getElementById('video'); v.style.display='block'; v.play();" style="
        font-family: Arial Black, Arial, sans-serif;
        font-size: 28px;
        color: #111111;
        background: #D4D0C8;
        border-top: 3px solid #FFFFFF;
        border-left: 3px solid #FFFFFF;
        border-right: 3px solid #444444;
        border-bottom: 3px solid #444444;
        outline: 2px solid #000000;
        padding: 10px 32px;
        cursor: pointer;
        line-height: 1;
      ">▶</button>
    </div>
    <video id="video" controls playsinline style="display:none;">
      <source src="sycamore_technologies.mp4" type="video/mp4">
    </video>
  </div>
</body>
</html>
